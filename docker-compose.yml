version: "3.9"

# ─────────────────────────────────────────────────────────────────
# PaperPhone — Full-Stack Docker Compose
#
# Services:
#   client  — Nginx serving H5/PWA + reverse-proxy to server
#   server  — Node.js API + WebSocket
#   mysql   — Message store / user DB
#   redis   — Online presence & session cache
#   minio   — S3-compatible object storage for media uploads
#
# Quick start:
#   cp server/.env.example server/.env   # and edit secrets
#   docker compose up -d
#   docker compose exec mysql mysql -u root -p paperphone < /schema.sql
# ─────────────────────────────────────────────────────────────────

services:

  # ── Frontend (Nginx) ──────────────────────────────────────────
  client:
    image: ${DOCKER_HUB_USER:-yourname}/paperphone-client:${TAG:-latest}
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - paperphone

  # ── Backend (Node.js) ─────────────────────────────────────────
  server:
    image: ${DOCKER_HUB_USER:-yourname}/paperphone-server:${TAG:-latest}
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: ./server/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - paperphone

  # ── MySQL 8 ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-changeme}
      MYSQL_DATABASE: paperphone
      MYSQL_USER: ${DB_USER:-paperphone}
      MYSQL_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - paperphone

  # ── Redis 7 ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning ${REDIS_PASS:+--requirepass $REDIS_PASS}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - paperphone

  # ── MinIO (S3-compatible) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO console (remove in prod if not needed)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - paperphone

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  paperphone:
    driver: bridge
