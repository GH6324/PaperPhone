<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PaperPhone">
  <meta name="theme-color" content="#07C160">
  <meta name="description" content="PaperPhone - 端对端加密即时通讯">
  <title>PaperPhone</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/public/icons/icon-192.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- libsodium (WebAssembly crypto) -->
  <script>
    window._sodiumPromise = new Promise((resolve, reject) => {
      const timer = setTimeout(() =>
        reject(new Error('Crypto library load timeout — check network')), 12000);

      const s = document.createElement('script');
      // Use the browser-ready UMD build (not the CJS modules build)
      s.src = 'https://cdn.jsdelivr.net/npm/libsodium-wrappers@0.7.13/dist/browsers/sodium.min.js';
      s.onerror = () => {
        clearTimeout(timer);
        reject(new Error('Failed to load crypto library (CDN unreachable)'));
      };
      s.onload = async () => {
        clearTimeout(timer);
        try {
          await window.sodium.ready;
          window._sodium = window.sodium;
          resolve(window.sodium);
        } catch (e) {
          reject(new Error('Crypto library init failed: ' + e.message));
        }
      };
      document.head.appendChild(s);
    });
  </script>

  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
